server:
  port: 8085

spring:
  application:
    name: ConfigServer

  cloud:
    config:
      server:
        git:
          uri: https://github.com/bhosalevivek04/microservice-config
          clone-on-start: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://admin:admin123@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true