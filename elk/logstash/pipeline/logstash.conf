input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON logs
  if [message] {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }
  
  # Add timestamp
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
  
  # Extract service name
  if [service_name] {
    mutate {
      add_field => {
        "service" => "%{service_name}"
      }
    }
  }
  
  # Add environment tag
  mutate {
    add_field => {
      "environment" => "development"
    }
  }
  
  # Parse log level
  if [level] {
    mutate {
      add_field => {
        "log_level" => "%{level}"
      }
    }
  }
  
  # Extract error information
  if [level] == "ERROR" {
    mutate {
      add_tag => ["error"]
    }
  }
  
  # Extract trace information
  if [traceId] {
    mutate {
      add_field => {
        "trace_id" => "%{traceId}"
      }
    }
  }
  
  if [spanId] {
    mutate {
      add_field => {
        "span_id" => "%{spanId}"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "microservices-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  
  # Debug output (optional - comment out in production)
  stdout {
    codec => rubydebug
  }
}
