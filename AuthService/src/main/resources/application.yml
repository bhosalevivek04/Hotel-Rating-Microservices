server:
  port: 8086

spring:
  application:
    name: AuthService
  config:
    import: optional:configserver:http://localhost:8085
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/auth_service_db}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: full
  circuitbreaker:
    enabled: true

# Logging for debugging
logging:
  level:
    com.vivek.auth.external: DEBUG
    feign: DEBUG

# Resilience4j Rate Limiter for Auth endpoints
resilience4j:
  ratelimiter:
    instances:
      authRateLimiter:
        limitRefreshPeriod: 60s
        limitForPeriod: 5
        timeoutDuration: 0s
        registerHealthIndicator: true
        eventConsumerBufferSize: 100

management:
  health:
    ratelimiters:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,ratelimiters
  endpoint:
    health:
      show-details: always

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://admin:admin123@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
