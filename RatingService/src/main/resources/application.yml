spring:
 application:
  name: RatingService
 config:
  import: optional:configserver:http://localhost:8085
 datasource:
  url: ${RATING_DB_URL:jdbc:mysql://localhost:3306/rating_service}
  username: ${RATING_DB_USERNAME:root}
  password: ${RATING_DB_PASSWORD}
  driver-class-name: com.mysql.cj.jdbc.Driver

 jpa:
  hibernate:
   ddl-auto: update
  show-sql: true

server:
  port: 8083

# Eureka configuration is fetched from Config Server (application.yml in Git)